<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    >
    <title>Trakt API Reference</title>
    <style>
      :root {
        color-scheme: light dark;
        --background: #0b1020;
        --surface: #141b30;
        --surface-muted: #1e2742;
        --border: #303a5c;
        --text: #f4f7ff;
        --text-muted: #afbad8;
        --accent: #7aa2ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: linear-gradient(180deg, #0b1020 0%, #11182b 100%);
        color: var(--text);
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont,
          'Segoe UI', sans-serif;
      }

      a {
        color: inherit;
      }

      .page {
        width: min(1100px, calc(100% - 2rem));
        margin: 0 auto;
        padding: 2rem 0 4rem;
      }

      .hero,
      .panel,
      .endpoint {
        background: rgba(20, 27, 48, 0.92);
        border: 1px solid var(--border);
        border-radius: 18px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      }

      .hero {
        padding: 2rem;
      }

      .hero h1 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 3rem);
      }

      .hero p {
        color: var(--text-muted);
        max-width: 72ch;
      }

      .hero-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 1.25rem;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.5rem 0.8rem;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--surface-muted);
        color: var(--text-muted);
        font-size: 0.95rem;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(220px, 280px) minmax(0, 1fr);
        gap: 1.5rem;
        margin-top: 1.5rem;
      }

      .panel {
        padding: 1.25rem;
      }

      .panel h2 {
        margin-top: 0;
      }

      .toc {
        position: sticky;
        top: 1rem;
      }

      .toc ul,
      .details-list,
      .response-list {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .toc li + li,
      .details-list li + li,
      .response-list li + li,
      .endpoint + .endpoint {
        margin-top: 0.9rem;
      }

      .toc a {
        display: block;
        padding: 0.7rem 0.85rem;
        border-radius: 12px;
        text-decoration: none;
        color: var(--text-muted);
        background: rgba(255, 255, 255, 0.02);
      }

      .toc a:hover,
      .toc a:focus-visible {
        color: var(--text);
        background: rgba(122, 162, 255, 0.12);
        outline: none;
      }

      .endpoint {
        padding: 1.25rem;
      }

      .endpoint-header {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.85rem;
        margin-bottom: 0.85rem;
      }

      .method {
        min-width: 4.5rem;
        padding: 0.5rem 0.75rem;
        border-radius: 999px;
        text-align: center;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .method-get {
        background: rgba(71, 176, 112, 0.18);
        color: #7be495;
      }

      .method-post {
        background: rgba(73, 153, 255, 0.18);
        color: #8bc0ff;
      }

      .method-put,
      .method-patch {
        background: rgba(244, 191, 86, 0.18);
        color: #ffd36b;
      }

      .method-delete {
        background: rgba(255, 110, 110, 0.18);
        color: #ff9b9b;
      }

      .endpoint-path {
        margin: 0;
        font-size: 1.1rem;
        word-break: break-word;
      }

      .endpoint-summary {
        margin: 0 0 0.6rem;
        font-size: 1.15rem;
      }

      .endpoint p,
      .details-list li,
      .response-list li {
        color: var(--text-muted);
      }

      .section-title {
        margin: 1rem 0 0.5rem;
        font-size: 0.95rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent);
      }

      code {
        padding: 0.2rem 0.35rem;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.06);
        font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo,
          monospace;
        font-size: 0.92em;
      }

      .empty-state {
        padding: 1.5rem;
        text-align: center;
        color: var(--text-muted);
      }

      @media (max-width: 860px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .toc {
          position: static;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <h1 id="title">Trakt API Reference</h1>
        <p id="description">
          Static documentation generated from this repository's OpenAPI contract.
        </p>
        <div class="hero-meta" id="meta"></div>
      </section>

      <div class="layout">
        <aside class="panel toc">
          <h2>Endpoints</h2>
          <ul id="toc-list"></ul>
        </aside>

        <section class="panel">
          <h2>Reference</h2>
          <div id="endpoint-list" class="empty-state">Loading OpenAPI specification…</div>
        </section>
      </div>
    </main>

    <script>
      const apiInfo = document.getElementById('meta');
      const tocList = document.getElementById('toc-list');
      const endpointList = document.getElementById('endpoint-list');

      const methodClass = (method) => `method method-${method.toLowerCase()}`;

      const text = (value) => document.createTextNode(value);

      const element = (tag, options = {}) => {
        const node = document.createElement(tag);

        if (options.className) node.className = options.className;
        if (options.id) node.id = options.id;
        if (options.href) node.href = options.href;
        if (options.text) node.textContent = options.text;

        for (const child of options.children ?? []) {
          node.append(child);
        }

        return node;
      };

      const renderMetaChip = (label, value) =>
        element('span', {
          className: 'chip',
          children: [
            element('strong', { text: `${label}:` }),
            text(` ${value}`),
          ],
        });

      const renderList = (items, mapper, className) => {
        const list = element('ul', { className });

        items.forEach((item) => {
          list.append(element('li', { children: mapper(item) }));
        });

        return list;
      };

      const httpMethods = new Set([
        'get',
        'post',
        'put',
        'patch',
        'delete',
        'options',
        'head',
        'trace',
      ]);

      const renderEndpoint = (path, method, operation, index) => {
        const endpointId = `endpoint-${index}`;
        const summary = operation.summary || operation.operationId || `${method.toUpperCase()} ${path}`;
        const description = operation.description;
        const tags = operation.tags ?? [];
        const parameters = operation.parameters ?? [];
        const responses = Object.entries(operation.responses ?? {});

        const details = [];

        if (tags.length) {
          details.push(
            element('div', {
              children: [
                element('h3', { className: 'section-title', text: 'Tags' }),
                renderList(
                  tags,
                  (tag) => [element('code', { text: tag })],
                  'details-list',
                ),
              ],
            }),
          );
        }

        if (parameters.length) {
          details.push(
            element('div', {
              children: [
                element('h3', { className: 'section-title', text: 'Parameters' }),
                renderList(
                  parameters,
                  (parameter) => {
                    const schemaType = parameter.schema?.type ||
                      (parameter.content ? 'content' : 'unknown');

                    return [
                      element('code', {
                        text: `${parameter.in}.${parameter.name}`,
                      }),
                      text(` — ${schemaType}`),
                      ...(parameter.description
                        ? [text(` — ${parameter.description}`)]
                        : []),
                    ];
                  },
                  'details-list',
                ),
              ],
            }),
          );
        }

        if (operation.requestBody) {
          const bodyContentTypes = Object.keys(operation.requestBody.content ?? {});

          details.push(
            element('div', {
              children: [
                element('h3', { className: 'section-title', text: 'Request body' }),
                renderList(
                  bodyContentTypes.length ? bodyContentTypes : ['application/json'],
                  (contentType) => [element('code', { text: contentType })],
                  'details-list',
                ),
              ],
            }),
          );
        }

        const responseSection = responses.length
          ? element('div', {
            children: [
              element('h3', { className: 'section-title', text: 'Responses' }),
              renderList(
                responses,
                ([status, response]) => {
                  const descriptionText = response.description || 'No description';
                  return [
                    element('code', { text: status }),
                    text(` — ${descriptionText}`),
                  ];
                },
                'response-list',
              ),
            ],
          })
          : null;

        return {
          tocItem: element('li', {
            children: [
              element('a', {
                href: `#${endpointId}`,
                text: `${method.toUpperCase()} ${path}`,
              }),
            ],
          }),
          section: element('article', {
            className: 'endpoint',
            id: endpointId,
            children: [
              element('div', {
                className: 'endpoint-header',
                children: [
                  element('span', {
                    className: methodClass(method),
                    text: method,
                  }),
                  element('p', {
                    className: 'endpoint-path',
                    children: [element('code', { text: path })],
                  }),
                ],
              }),
              element('h3', {
                className: 'endpoint-summary',
                text: summary,
              }),
              ...(description ? [element('p', { text: description })] : []),
              ...details,
              ...(responseSection ? [responseSection] : []),
            ],
          }),
        };
      };

      const showError = (message) => {
        endpointList.className = 'empty-state';
        endpointList.textContent = message;
      };

      fetch('./openapi.json')
        .then((response) => {
          if (!response.ok) {
            throw new Error(`Unable to load openapi.json (${response.status})`);
          }

          return response.json();
        })
        .then((spec) => {
          document.getElementById('title').textContent = spec.info?.title || 'Trakt API Reference';
          document.getElementById('description').textContent = spec.info?.description ||
            'Static documentation generated from this repository\'s OpenAPI contract.';

          apiInfo.replaceChildren(
            renderMetaChip('Version', spec.info?.version || 'unknown'),
            renderMetaChip('OpenAPI', spec.openapi || 'unknown'),
            ...(spec.servers?.[0]?.url
              ? [renderMetaChip('Server', spec.servers[0].url)]
              : []),
          );

          const operations = [];

          Object.entries(spec.paths || {}).forEach(([path, pathItem]) => {
            Object.entries(pathItem || {}).forEach(([method, operation]) => {
              if (
                httpMethods.has(method) &&
                typeof operation === 'object' &&
                operation !== null
              ) {
                operations.push({ path, method, operation });
              }
            });
          });

          if (!operations.length) {
            showError('No endpoints were found in openapi.json.');
            return;
          }

          endpointList.className = '';
          endpointList.replaceChildren();
          tocList.replaceChildren();

          operations.forEach(({ path, method, operation }, index) => {
            const { tocItem, section } = renderEndpoint(path, method, operation, index);
            tocList.append(tocItem);
            endpointList.append(section);
          });
        })
        .catch((error) => {
          showError(error.message);
        });
    </script>
  </body>
</html>
