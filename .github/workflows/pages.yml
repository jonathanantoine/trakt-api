name: GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/pages.yml'
      - 'deno.json'
      - 'deno.lock'
      - 'projects/api/deno.json'
      - 'projects/api/src/**'
      - 'projects/openapi/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static API site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.3.0

      - name: Install dependencies
        run: deno task install

      - name: Generate OpenAPI specification
        run: deno task openapi:generate

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Assemble static site
        run: |
          mkdir -p _site
          cp projects/openapi/static/index.html _site/index.html
          cp projects/openapi/openapi.json _site/openapi.json

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy static API site
    needs: build
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
